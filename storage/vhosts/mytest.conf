<VirtualHost *:80>
    ServerName mytest.localhost
    DocumentRoot /var/www/html

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/
</VirtualHost>
<VirtualHost *:443>
    ServerName mytest.localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile C:\Apache24\htdocs\flyclone-manager\storage\vhosts/mytest.crt
    SSLCertificateKeyFile C:\Apache24\htdocs\flyclone-manager\storage\vhosts/mytest.key

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/
</VirtualHost>